services:
  - type: web
    name: prospecthunter-cy-ass
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm ci && npm run build -w apps/api
    startCommand: API_PORT=$PORT npm run start -w apps/api
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_PATH
        value: ./data/muse.db
